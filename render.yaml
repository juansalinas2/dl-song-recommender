services:
  - type: web
    name: dl-song-recommender-web
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: XDG_CACHE_HOME
        value: /tmp/.cache
      - key: TORCH_HOME
        value: /tmp/torch
      - key: MPLCONFIGDIR
        value: /tmp/matplotlib
      - key: SONG_RECOMMENDER_EVALUATION_DB_PATH
        value: /tmp/song-recommender/evaluation.sqlite3
      - key: SONG_RECOMMENDER_DEFAULT_MODEL_ID
        value: 04_resnet18_contrastive_tags
      - key: SONG_RECOMMENDER_ENABLED_MODEL_IDS
        value: 04_resnet18_contrastive_tags,baseline,05_resnet18_contrastive_tags_infonce,06_resnet18_contrastive_tags_audio_grounded_infonce,07_resnet18_audio_centric_blended_teacher
    preDeployCommand: PYTHONPATH=src python -m song_recommender.web.render_predeploy
    healthCheckPath: /health
    autoDeployTrigger: off
